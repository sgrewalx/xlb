name: Refresh Video

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: refresh-video
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh video manifest
        run: npm run automation:video

      - name: Validate content
        run: npm run validate:content

      - name: Detect manifest changes
        id: changes
        run: |
          if git diff --quiet -- public/content/video/top3.json public/content/video/top.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit manifest update
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add public/content/video/top3.json public/content/video/top.json
          git commit -m "chore: refresh video manifest"

      - name: Push to main
        if: steps.changes.outputs.changed == 'true'
        run: |
          for attempt in 1 2 3; do
            git pull --rebase origin main

            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying after a short delay..."
            sleep 5
          done

          echo "Unable to push refreshed video manifest after 3 attempts."
          exit 1
