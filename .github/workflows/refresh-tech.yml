name: Refresh Tech

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - run: pnpm install
      - run: pnpm automation:tech
      - run: pnpm validate:content
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content/tech/top.json public/content/tech/top3.json
          git diff --cached --quiet || git commit -m "Refresh Tech content"
      - run: git push origin HEAD:main
