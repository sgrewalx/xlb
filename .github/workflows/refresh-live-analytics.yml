name: Refresh Live Analytics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-live-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute snapshot date
        run: echo "XLB_SNAPSHOT_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Import GA4 snapshot
        run: npm run automation:import-ga4

      - name: Import Search Console snapshot
        run: npm run automation:import-search-console

      - name: Merge analytics snapshots
        run: npm run automation:merge-analytics

      - name: Rank live events
        run: XLB_ANALYTICS_SNAPSHOT=./automation/snapshots/merged-${XLB_SNAPSHOT_DATE}.json npm run automation:rank-live

      - name: Refresh live event manifests
        run: npm run automation:live-events

      - name: Check source health
        run: XLB_FAIL_ON_DEGRADED_SOURCES=1 npm run automation:source-health

      - name: Assess live automation risk
        run: XLB_FAIL_ON_HIGH_RISK=1 npm run automation:assess-live-risk

      - name: Validate content
        run: npm run validate:content

      - name: Publish ops summary
        run: npm run automation:ops-summary

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- public/content/live public/content/topics automation/snapshots automation/reports public/sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read risk level
        id: risk
        run: |
          echo "level=$(node -p 'JSON.parse(require(\"fs\").readFileSync(\"automation/reports/live-risk-report.json\",\"utf8\")).level')" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create automation branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH_NAME="automation/live-refresh-${XLB_SNAPSHOT_DATE}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
          git checkout -b "${BRANCH_NAME}"

      - name: Commit analytics refresh
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add public/content/live public/content/topics automation/snapshots automation/reports public/sitemap.xml
          git commit -m "chore: refresh live analytics and event rankings"

      - name: Push automation branch
        if: steps.changes.outputs.changed == 'true'
        run: git push origin HEAD:"${BRANCH_NAME}"

      - name: Create pull request for review
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          branch: ${{ env.BRANCH_NAME }}
          base: main
          title: "chore: refresh live analytics and event rankings"
          commit-message: "chore: refresh live analytics and event rankings"
          body: |
            Automated live analytics refresh.

            Risk level: `${{ steps.risk.outputs.level }}`

            See the workflow summary for the latest source health, deploy readiness, and top event decisions.

            This workflow now routes live-event inventory changes through PR review instead of pushing directly to `main`.
          labels: |
            automation
            live-events
