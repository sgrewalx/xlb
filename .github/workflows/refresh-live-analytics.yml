name: Refresh Live Analytics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

env:
  GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID }}
  SEARCH_CONSOLE_SITE_URL: ${{ vars.SEARCH_CONSOLE_SITE_URL }}
  XLB_GA4_LOOKBACK_DAYS: ${{ vars.XLB_GA4_LOOKBACK_DAYS }}
  XLB_SEARCH_CONSOLE_LAG_DAYS: ${{ vars.XLB_SEARCH_CONSOLE_LAG_DAYS }}
  XLB_SEARCH_CONSOLE_LOOKBACK_DAYS: ${{ vars.XLB_SEARCH_CONSOLE_LOOKBACK_DAYS }}

jobs:
  refresh-live-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute snapshot date
        run: echo "XLB_SNAPSHOT_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Prepare Google service account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/google-service-account.json"
            printf '%s' "${GOOGLE_SERVICE_ACCOUNT_JSON}" > "${CREDENTIALS_FILE}"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${CREDENTIALS_FILE}" >> "$GITHUB_ENV"
          fi

      - name: Capture GA4 snapshot
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -n "${GA4_PROPERTY_ID:-}" ]; then
            npm run automation:fetch-ga4
          else
            npm run automation:import-ga4
          fi

      - name: Capture Search Console snapshot
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -n "${SEARCH_CONSOLE_SITE_URL:-}" ]; then
            npm run automation:fetch-search-console
          else
            npm run automation:import-search-console
          fi

      - name: Merge analytics snapshots
        run: npm run automation:merge-analytics

      - name: Generate traffic opportunity queue
        run: XLB_ANALYTICS_SNAPSHOT=./automation/snapshots/merged-${XLB_SNAPSHOT_DATE}.json npm run automation:traffic-opportunities

      - name: Rank live events
        run: XLB_ANALYTICS_SNAPSHOT=./automation/snapshots/merged-${XLB_SNAPSHOT_DATE}.json npm run automation:rank-live

      - name: Refresh live event manifests
        run: npm run automation:live-events

      - name: Apply low-risk autofixes
        run: npm run automation:apply-low-risk-fixes

      - name: Apply traffic opportunities
        run: npm run automation:apply-opportunities
        
      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Run content audit
        run: npm run automation:content-audit

      - name: Check source health
        run: XLB_FAIL_ON_DEGRADED_SOURCES=1 npm run automation:source-health

      - name: Assess live automation risk
        run: XLB_FAIL_ON_HIGH_RISK=1 npm run automation:assess-live-risk

      - name: Validate content
        run: npm run validate:content

      - name: Publish ops summary
        run: npm run automation:ops-summary

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- public/content/live public/content/topics automation/snapshots automation/reports automation/experiments public/sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read risk level
        id: risk
        run: |
          LEVEL="$(node -e "const fs = require('fs'); process.stdout.write(JSON.parse(fs.readFileSync('automation/reports/live-risk-report.json', 'utf8')).level)")"
          echo "level=${LEVEL}" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create automation branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH_NAME="automation/live-refresh"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
          git fetch origin "${BRANCH_NAME}" || true
          git checkout -B "${BRANCH_NAME}"

      - name: Commit analytics refresh
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add public/content/live public/content/topics automation/snapshots automation/reports automation/experiments public/sitemap.xml
          git commit -m "chore: refresh live analytics and event rankings"

      - name: Push automation branch
        if: steps.changes.outputs.changed == 'true'
        run: git push --force-with-lease origin HEAD:"${BRANCH_NAME}"

      - name: Create or update pull request for review
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE="$(mktemp)"

          cat > "${BODY_FILE}" <<'EOF'
            Automated live analytics refresh.

            Risk level: `${{ steps.risk.outputs.level }}`

            See the workflow summary for the latest source health, deploy readiness, and top event decisions.

            This workflow routes live-event inventory changes through one rolling PR review branch instead of creating a new branch every day.
          EOF

          if gh pr view "${BRANCH_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh pr edit "${BRANCH_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "chore: refresh live analytics and event rankings" \
              --body-file "${BODY_FILE}"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --head "${BRANCH_NAME}" \
              --base main \
              --title "chore: refresh live analytics and event rankings" \
              --body-file "${BODY_FILE}"
          fi
