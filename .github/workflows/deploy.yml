name: Deploy

on:
  workflow_dispatch:
    inputs:
      allow_beta_deploy:
        description: "Allow a supervised soft beta deploy when readiness is review-required"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  SITE_BUCKET: xlb-codemachine-in-site
  CLOUDFRONT_DISTRIBUTION_ID: ESCMUKA0YFHMN
  VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Check source health
        run: npm run automation:source-health

      - name: Assess live automation risk
        run: npm run automation:assess-live-risk

      - name: Check deploy readiness
        run: |
          FAIL_ON_REVIEW=1

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.allow_beta_deploy }}" = "true" ]; then
            echo "Supervised beta deploy override enabled for review-required readiness."
            FAIL_ON_REVIEW=0
          fi

          if [ "${{ vars.ALLOW_SOFT_BETA_AUTO_DEPLOY }}" = "true" ]; then
            echo "Repository soft-beta auto-deploy override enabled for review-required readiness."
            FAIL_ON_REVIEW=0
          fi

          XLB_FAIL_ON_BLOCKED_DEPLOY=1 XLB_FAIL_ON_REVIEW_DEPLOY=$FAIL_ON_REVIEW npm run automation:check-deploy-readiness

      - name: Publish ops summary
        run: npm run automation:ops-summary

      - name: Build site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload immutable assets
        run: |
          aws s3 sync dist/assets "s3://${SITE_BUCKET}/assets" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload content manifests
        run: |
          aws s3 sync dist/content "s3://${SITE_BUCKET}/content" \
            --delete \
            --cache-control "public,max-age=300,must-revalidate"

      - name: Upload root files
        run: |
          aws s3 sync dist "s3://${SITE_BUCKET}" \
            --delete \
            --exclude "assets/*" \
            --exclude "content/*" \
            --cache-control "public,max-age=60,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/" "/index.html" "/content/*"
